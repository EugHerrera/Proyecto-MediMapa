server:
  port: 8080 # El Gateway SIEMPRE es el 8080

spring:
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000 # 5 segundos máximo para conectar
        response-timeout: 5s  # 5 segundos máximo esperando la respuesta
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173" # La URL de tu React
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # RUTA 1: MICROSERVICIO CATÁLOGO
        - id: ms-catalogo-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/catalogo/**

        # RUTA 2: SCRAPER
        - id: medimapa-scraper-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/scraper/**
            
        # RUTA 3: MICROSERVICIO GEOLOCALIZACIÓN
        - id: ms-geo-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/geo/**

        # RUTA 4: MICROSERVICIO USUARIOS
        - id: ms-usuarios-route
          uri: http://localhost:8085
          predicates:
            - Path=/api/usuarios/**, /api/buscador/**